<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>ADZ tv plus | دردشة فيديو مميزة</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

:root{
--primary-grad: linear-gradient(135deg,#6366f1 0%,#a855f7 50%,#ec4899 100%);
--bg-dark:#020617;
--glass:rgba(255,255,255,0.03);
--border:rgba(255,255,255,0.1);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif;}

body{
background:radial-gradient(circle at 50% -20%,#1e1b4b 0%,var(--bg-dark) 80%);
color:#f8fafc;
min-height:100vh;
overflow-x:hidden;
}

.container{max-width:1200px;margin:0 auto;padding:0 20px;}

header{
backdrop-filter:blur(15px);
background:rgba(2,6,23,0.8);
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:100;
}

.nav{
height:75px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
color:white;
}

.logo-box{
width:40px;
height:40px;
background:var(--primary-grad);
border-radius:12px;
display:grid;
place-items:center;
font-weight:900;
}

#user-profile{display:none;align-items:center;gap:12px;}

.profile-info{
display:flex;
align-items:center;
gap:10px;
padding:5px 15px;
background:var(--glass);
border-radius:50px;
border:1px solid var(--border);
}

.profile-info img{
width:30px;
height:30px;
border-radius:50%;
}

.logout-btn{
color:#ff4e4e;
font-size:0.8rem;
cursor:pointer;
background:none;
border:none;
font-weight:600;
}

.hero{
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
padding:80px 0;
align-items:center;
}

.hero-text h1{
font-size:clamp(2.5rem,5vw,4rem);
line-height:1.1;
font-weight:900;
margin-bottom:25px;
}

.hero-text h1 span{
background:var(--primary-grad);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero-text p{
color:#94a3b8;
font-size:1.1rem;
line-height:1.6;
margin-bottom:35px;
}

.auth-box{
background:rgba(255,255,255,0.02);
padding:25px;
border-radius:20px;
border:1px dashed var(--border);
display:inline-block;
min-width:300px;
}

.video-card{
background:var(--glass);
border-radius:35px;
padding:25px;
border:1px solid var(--border);
position:relative;
box-shadow:0 40px 100px rgba(0,0,0,0.6);
}

.viewport{
width:100%;
aspect-ratio:4/3;
background:#000;
border-radius:20px;
position:relative;
overflow:hidden;
}

video{
background:black;
}

#remoteVideo{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

#localVideo{
position:absolute;
bottom:10px;
left:10px;
width:140px;
border-radius:12px;
border:2px solid #a855f7;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.live-badge{
position:absolute;
top:15px;
right:15px;
background:rgba(239,68,68,0.2);
color:#ef4444;
padding:5px 12px;
border-radius:50px;
font-size:0.75rem;
font-weight:700;
display:flex;
align-items:center;
gap:6px;
}

.dot{
width:8px;
height:8px;
background:#ef4444;
border-radius:50%;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:1}
50%{opacity:.4}
100%{opacity:1}
}

.main-btn{
background:var(--primary-grad);
color:white;
border:none;
padding:16px 35px;
border-radius:15px;
font-weight:700;
cursor:pointer;
width:100%;
margin-top:15px;
}

.control-row{
display:flex;
gap:10px;
margin-top:10px;
}

</style>
</head>

<body>

<header>
<div class="container nav">

<a href="#" class="logo">
<div class="logo-box">ADZ</div>
<span style="font-weight:800;font-size:1.3rem;">tv plus</span>
</a>

<div id="user-profile">
<div class="profile-info">
<img id="user-img" src="">
<span id="user-name"></span>
</div>
<button class="logout-btn" onclick="logout()">خروج</button>
</div>

</div>
</header>

<main class="container">

<section class="hero">

<div class="hero-text">

<h1>تواصل مع العالم <br><span>بضغطة واحدة</span></h1>

<p>
المنصة الأكثر أماناً لمقابلة أشخاص جدد.
</p>

<div id="google-auth-container" class="auth-box">

<h3 style="margin-bottom:20px">👇 سجل دخولك للبدء</h3>

<div id="g_id_onload"
data-client_id="466299124959-qpe6mgcsvl4ktnm5f9fqurdaa8673u5a.apps.googleusercontent.com"
data-callback="onSignIn"
data-auto_prompt="false"></div>

<div class="g_id_signin"
data-type="standard"
data-shape="pill"
data-theme="filled_black"
data-size="large"></div>

</div>

</div>

<div class="video-card">

<div class="viewport">

<div class="live-badge">
<div class="dot"></div>
مباشر
</div>

<video id="remoteVideo" autoplay playsinline></video>
<video id="localVideo" autoplay muted playsinline></video>

</div>

<button id="start-call" class="main-btn" disabled>
ابدأ البحث عن شريك
</button>

<div class="control-row">

<button id="next-user" class="main-btn">التالي ⏭</button>
<button id="toggle-mic" class="main-btn">كتم 🎤</button>
<button id="toggle-cam" class="main-btn">الكاميرا 📷</button>

</div>

</div>

</section>
</main>

<script>

window.onload=function(){

const savedUser=localStorage.getItem('adz_user');

if(savedUser){
renderUserInfo(JSON.parse(savedUser));
}

};

function onSignIn(response){

const base64Url=response.credential.split('.')[1];
const base64=base64Url.replace(/-/g,'+').replace(/_/g,'/');
const jsonPayload=decodeURIComponent(atob(base64).split('').map(function(c){
return '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2);
}).join(''));

const user=JSON.parse(jsonPayload);

localStorage.setItem('adz_user',JSON.stringify(user));

renderUserInfo(user);

}

function renderUserInfo(user){

document.getElementById('google-auth-container').style.display='none';

const profile=document.getElementById('user-profile');
profile.style.display='flex';

document.getElementById('user-name').innerText=user.given_name;
document.getElementById('user-img').src=user.picture;

const callBtn=document.getElementById('start-call');
callBtn.disabled=false;
callBtn.innerText="ابدأ البحث الآن ✨";

}

function logout(){

localStorage.removeItem('adz_user');
location.reload();

}

// ===== VIDEO SYSTEM =====

let localStream;
let peerConnection;

const servers={
iceServers:[
{urls:"stun:stun.l.google.com:19302"}
]
};

const localVideo=document.getElementById("localVideo");
const remoteVideo=document.getElementById("remoteVideo");

async function startCamera(){

try{

localStream=await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

localVideo.srcObject=localStream;

}catch(e){

alert("لا يمكن تشغيل الكاميرا");

}

}

async function startPeer(){

peerConnection=new RTCPeerConnection(servers);

localStream.getTracks().forEach(track=>{
peerConnection.addTrack(track,localStream);
});

peerConnection.ontrack=(event)=>{
remoteVideo.srcObject=event.streams[0];
};

}

document.getElementById("start-call").onclick=async()=>{

await startCamera();
await startPeer();

};

// mic
document.getElementById("toggle-mic").onclick=()=>{

if(!localStream) return;

const track=localStream.getAudioTracks()[0];
track.enabled=!track.enabled;

};

// cam
document.getElementById("toggle-cam").onclick=()=>{

if(!localStream) return;

const track=localStream.getVideoTracks()[0];
track.enabled=!track.enabled;

};

// next
document.getElementById("next-user").onclick=()=>{

if(peerConnection){
peerConnection.close();
}

remoteVideo.srcObject=null;

startPeer();

};

</script>

</body>
</html>
