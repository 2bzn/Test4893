<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8" />
<title>ADZ tv plus | دردشة فيديو مميزة</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

:root{
--primary-grad:linear-gradient(135deg,#6366f1 0%,#a855f7 50%,#ec4899 100%);
--bg-dark:#020617;
--glass:rgba(255,255,255,0.03);
--border:rgba(255,255,255,0.1);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',system-ui,sans-serif;
}

body{
background:radial-gradient(circle at 50% -20%,#1e1b4b 0%,var(--bg-dark) 80%);
color:#f8fafc;
min-height:100vh;
overflow-x:hidden;
}

.container{
max-width:1200px;
margin:0 auto;
padding:0 20px;
}

header{
backdrop-filter:blur(15px);
background:rgba(2,6,23,0.8);
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:100;
}

.nav{
height:75px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
color:white;
}

.logo-box{
width:40px;
height:40px;
background:var(--primary-grad);
border-radius:12px;
display:grid;
place-items:center;
font-weight:900;
}

#user-profile{
display:none;
align-items:center;
gap:12px;
}

.profile-info{
display:flex;
align-items:center;
gap:10px;
padding:5px 15px;
background:var(--glass);
border-radius:50px;
border:1px solid var(--border);
}

.profile-info img{
width:30px;
height:30px;
border-radius:50%;
}

.logout-btn{
color:#ff4e4e;
font-size:0.8rem;
cursor:pointer;
background:none;
border:none;
font-weight:600;
}

.hero{
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
padding:80px 0;
align-items:center;
}

.hero-text h1{
font-size:clamp(2.5rem,5vw,4rem);
font-weight:900;
margin-bottom:25px;
}

.hero-text span{
background:var(--primary-grad);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.auth-box{
background:rgba(255,255,255,0.02);
padding:25px;
border-radius:20px;
border:1px dashed var(--border);
}

.video-card{
background:var(--glass);
border-radius:35px;
padding:25px;
border:1px solid var(--border);
position:relative;
}

.viewport{
width:100%;
aspect-ratio:4/3;
background:#000;
border-radius:20px;
position:relative;
overflow:hidden;
}

video{
background:black;
}

#remoteVideo{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

#localVideo{
position:absolute;
bottom:10px;
left:10px;
width:140px;
border-radius:12px;
border:2px solid #a855f7;
}

.main-btn{
background:var(--primary-grad);
color:white;
border:none;
padding:14px;
border-radius:12px;
font-weight:700;
cursor:pointer;
width:100%;
margin-top:10px;
transition:.2s;
}

.main-btn:hover{
transform:scale(1.05);
}

.control-row{
display:flex;
gap:10px;
}

.chat-box{
margin-top:15px;
background:#020617;
border-radius:15px;
padding:10px;
height:160px;
overflow-y:auto;
font-size:0.85rem;
}

.chat-input{
display:flex;
gap:5px;
margin-top:5px;
}

.chat-input input{
flex:1;
padding:8px;
border-radius:8px;
border:none;
}

.footer{
margin-top:40px;
text-align:center;
opacity:.6;
font-size:.8rem;
}

.online{
margin-top:10px;
font-size:0.9rem;
color:#94a3b8;
}

.status{
margin-top:6px;
font-size:0.8rem;
color:#38bdf8;
}

</style>
</head>

<body>

<header>
<div class="container nav">

<a href="#" class="logo">
<div class="logo-box">ADZ</div>
<span style="font-weight:800;font-size:1.3rem;">tv plus</span>
</a>

<div id="user-profile">
<div class="profile-info">
<img id="user-img">
<span id="user-name"></span>
</div>
<button class="logout-btn" onclick="logout()">خروج</button>
</div>

</div>
</header>

<main class="container">

<section class="hero">

<div class="hero-text">

<h1>تواصل مع العالم <br><span>بضغطة واحدة</span></h1>

<p>منصة دردشة فيديو عشوائية للقاء أشخاص جدد.</p>

<div id="google-auth-container" class="auth-box">

<h3 style="margin-bottom:20px">👇 سجل دخولك للبدء</h3>

<div id="g_id_onload"
data-client_id="466299124959-qpe6mgcsvl4ktnm5f9fqurdaa8673u5a.apps.googleusercontent.com"
data-callback="onSignIn"
data-auto_prompt="false"></div>

<div class="g_id_signin"
data-type="standard"
data-shape="pill"
data-theme="filled_black"
data-size="large"></div>

</div>

</div>

<div class="video-card">

<div class="viewport">
<video id="remoteVideo" autoplay playsinline></video>
<video id="localVideo" autoplay muted playsinline></video>
</div>

<div class="online">
👥 المتصلون الآن: <span id="onlineCount">1</span>
</div>

<div class="status" id="statusText">
جاهز للبحث عن شريك
</div>

<button id="start-call" class="main-btn" disabled>
ابدأ البحث عن شريك
</button>

<div class="control-row">

<button id="next-user" class="main-btn">التالي ⏭</button>
<button id="toggle-mic" class="main-btn">🎤</button>
<button id="toggle-cam" class="main-btn">📷</button>
<button id="flip-cam" class="main-btn">🔄</button>

</div>

<div class="chat-box" id="chatBox"></div>

<div class="chat-input">
<input id="chatInput" placeholder="اكتب رسالة...">
<button onclick="sendMsg()">إرسال</button>
</div>

</div>

</section>

<div class="footer">
© 2026 ADZ tv plus — جميع الحقوق محفوظة
</div>

</main>

<script>

window.onload=function(){

const savedUser=localStorage.getItem('adz_user');

if(savedUser){
renderUserInfo(JSON.parse(savedUser));
}

simulateOnline();
systemMsg("👋 مرحباً بك في ADZ tv plus");

};

function systemMsg(text){
const box=document.getElementById("chatBox");
const msg=document.createElement("div");
msg.style.opacity="0.7";
msg.innerText=text;
box.appendChild(msg);
}

function onSignIn(response){

const base64Url=response.credential.split('.')[1];
const base64=base64Url.replace(/-/g,'+').replace(/_/g,'/');
const jsonPayload=decodeURIComponent(atob(base64).split('').map(function(c){
return '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2);
}).join(''));

const user=JSON.parse(jsonPayload);

localStorage.setItem('adz_user',JSON.stringify(user));

renderUserInfo(user);

}

function renderUserInfo(user){

document.getElementById('google-auth-container').style.display='none';

const profile=document.getElementById('user-profile');
profile.style.display='flex';

document.getElementById('user-name').innerText=user.given_name;
document.getElementById('user-img').src=user.picture;

document.getElementById('start-call').disabled=false;

}

function logout(){
localStorage.removeItem('adz_user');
location.reload();
}

/* video */

let localStream;
let peerConnection;
let facing="user";

const servers={
iceServers:[{urls:"stun:stun.l.google.com:19302"}]
};

const localVideo=document.getElementById("localVideo");
const remoteVideo=document.getElementById("remoteVideo");

async function startCamera(){

try{

localStream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:facing},
audio:true
});

localVideo.srcObject=localStream;

}catch(e){

alert("لا يمكن تشغيل الكاميرا");

}

}

async function startPeer(){

peerConnection=new RTCPeerConnection(servers);

localStream.getTracks().forEach(track=>{
peerConnection.addTrack(track,localStream);
});

peerConnection.ontrack=(event)=>{
remoteVideo.srcObject=event.streams[0];
document.getElementById("statusText").innerText="✅ تم الاتصال بشخص";
};

}

/* start */

document.getElementById("start-call").onclick=async()=>{

document.getElementById("statusText").innerText="🔎 جاري البحث عن شخص...";

await startCamera();
await startPeer();

};

/* mic */

document.getElementById("toggle-mic").onclick=()=>{

if(!localStream) return;

const track=localStream.getAudioTracks()[0];
track.enabled=!track.enabled;

document.getElementById("toggle-mic").innerText=track.enabled?"🎤":"🔇";

};

/* cam */

document.getElementById("toggle-cam").onclick=()=>{

if(!localStream) return;

const track=localStream.getVideoTracks()[0];
track.enabled=!track.enabled;

document.getElementById("toggle-cam").innerText=track.enabled?"📷":"🚫";

};

/* flip camera */

document.getElementById("flip-cam").onclick=async()=>{

facing=facing==="user"?"environment":"user";

await startCamera();

};

/* next */

document.getElementById("next-user").onclick=()=>{

document.getElementById("statusText").innerText="⏭ البحث عن شخص آخر...";

if(peerConnection){
peerConnection.close();
}

remoteVideo.srcObject=null;

startPeer();

};

/* chat */

function sendMsg(){

const input=document.getElementById("chatInput");
const box=document.getElementById("chatBox");

if(input.value.trim()=="") return;

const msg=document.createElement("div");

msg.innerText="أنت: "+input.value;

box.appendChild(msg);

box.scrollTop=box.scrollHeight;

input.value="";

}

/* enter send */

document.getElementById("chatInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendMsg();
}

});

/* fake online counter */

function simulateOnline(){

setInterval(()=>{

const n=800+Math.floor(Math.random()*500);

document.getElementById("onlineCount").innerText=n;

},3000);

}

</script>

</body>
</html>
